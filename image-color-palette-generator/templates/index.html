<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator | Day 92</title>

     <!-- Import Bootstrap CSS stylesheet from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- cdnjsthird-party library host.-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Import custom CSS stylesheet to override and extend Bootstrap styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>





<body class="bg-dark text-light">


    <div class="container py-5">

        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-white">🎨 Image Color Palette Generator</h1>

            <p class="lead text-secondary">Upload an image → Discover its top 10 dominant colors</p>

        </div>

        <!-- Upload Area -->
        <div class="upload-area rounded-4 p-5 text-center mb-5"
             id="dropZone">

            <i class="fas fa-cloud-upload-alt fa-5x mb-3 text-primary"></i>

            <h4>Drag & drop your image here</h4>

            <p class="text-secondary">
                or
            </p>

            <!--
              UI HACK: The standard <input type="file"> is ugly and hard to style.
              By wrapping it in a <label> with Bootstrap button classes and setting the
              input to 'hidden', we create a custom-styled upload button.
              Clicking the label automatically triggers the hidden file picker.
            -->
            <label class="btn btn-primary btn-lg px-5">

                <i class="fas fa-folder-open me-2"></i>
                Browse Files

                <input type="file" id="fileInput" accept="image/*" hidden>

            </label>

            <p class="mt-3 small text-secondary">PNG, JPG, JPEG, WebP • Max 16MB</p>

        </div>

                                                        <!-- Loading -->

        <!-- d-none stands for "Display: None" -->
        <div id="loading" class="text-center d-none">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <p>Analyzing colors with K-Means clustering...</p>
        </div>

                                                        <!-- Results -->
        <!-- d-none stands for "Display: None" -->
        <div id="results" class="d-none">

            <div class="row">

                <div class="col-lg-5 mb-4">


                    <div class="card border-0 shadow h-100">

                        <img id="uploadedImage" class="card-img-top rounded-top" alt="Uploaded image">

                    </div>


                </div>



                <div class="col-lg-7">
                    <h4 class="mb-4">Top 10 Dominant Colors</h4>

                    <!-- JavaScript loops through this html empty div -->
                    <div id="colorSwatches" class="row g-3"></div>

                </div>

            </div>

                <!-- Reset button -->
            <div class="text-center mt-4">
                <button id="resetBtn" class="btn btn-secondary btn-lg">

                    <i class="fas fa-redo me-2"></i>Upload Another Image

                </button>
                
            </div>


        </div>

    </div>

    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ──────────────────────────────────────────────────────────────────────────
        // DOM ELEMENTS (Document Object Model)
        // Grabbing HTML elements by their IDs so JavaScript can listen for user
        // interactions and update the UI dynamically.
        // ──────────────────────────────────────────────────────────────────────────
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const uploadedImage = document.getElementById('uploadedImage');
        const colorSwatches = document.getElementById('colorSwatches');
        const resetBtn = document.getElementById('resetBtn');

        // ──────────────────────────────────────────────────────────────────────────
        // EventListeners
        // ──────────────────────────────────────────────────────────────────────────

        // Drag & Drop handlers
        dropZone.addEventListener('dragover', (e) => {
            // Prevents the browser from blocking the drop, allowing the 'drop' event to fire.
            e.preventDefault();
            dropZone.classList.add('bg-primary', 'bg-opacity-30');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-primary', 'bg-opacity-10');
        });
        

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();

            dropZone.classList.remove('bg-primary', 'bg-opacity-40');

            const file = e.dataTransfer.files[0];

            if (file) handleFile(file);     // <=====  FUNCTION HELPER

        });


        fileInput.addEventListener('change', (e) => {

            const file = e.target.files[0];

            if (file) handleFile(file);     // <=====  FUNCTION HELPER
            
        });

        resetBtn.addEventListener('click', resetUI); 




        // ──────────────────────────────────────────────────────────────────────────
        // Logic Functions
        // ──────────────────────────────────────────────────────────────────────────

        function handleFile(file) {

            if (!file.type.startsWith('image/')) {
                alert('Please upload a valid image file.');
                return;
            }

            /*   Prepare the data to be sent to the server.
               The label 'file' must match the key used in Flask: request.files['file'] */

            const formData = new FormData();
            formData.append('file', file);

            // Show loading
            
            dropZone.classList.add('d-none');
            loading.classList.remove('d-none');
            results.classList.add('d-none');

            /* Send the image data to the Flask '/upload' route via an asynchronous POST request.
               The 'body' contains our formData, which holds the image file. */
 
            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            
            .then(response => response.json()) // This converts the JSON string back into a JS Object (data)

            /* Parse the JSON response from Flask.
               'data.success' and 'data.error' match the dictionary keys sent by jsonify() in Python. */

            .then(data => {

                /* 'data' now contains 'image_url' and 'colors' because Python sent them in the JSON.
                     This object lives only for this function call.*/

                if (data.success) {

                    // If the backend processed the image successfully, render the results.
                    showResults(data);      // <=====  FUNCTION HELPER

                } else {

                    // If the backend sent an error message, alert the error and if there is no error, it shows "Upload failed"
                    alert(data.error || 'Upload failed');
                    resetUI();      // <=====  FUNCTION HELPER

                }
            })

            .catch(err => {
                console.error(err);
                alert('Something went wrong. Please try again.');
                resetUI();      // <=====  FUNCTION HELPER
            });
        }







        function showResults(data) {
            loading.classList.add('d-none');
            results.classList.remove('d-none');

            /* JavaScript injects the 'src' attribute into the <img> tag in real-time.
               This is "DOM Manipulation" (Document Object Model) */

            uploadedImage.src = data.image_url;

            // Render color swatches
            colorSwatches.innerHTML = '';   


            data.colors.forEach(color => {

                const col = document.createElement('div');  // JS creates a new <div> in memory
                col.className = 'col-6 col-sm-4 col-md-3 col-lg-2';

                col.innerHTML = `

                    <div class="color-swatch rounded-3"
                         style="background-color: ${color.hex}; height: 120px; cursor: pointer;"

                         onclick="copyToClipboard('${color.hex}', this)">  


                        <div class="p-3 bg-black bg-opacity-75 text-white small">

                            <div class="fw-bold">${color.hex}</div>
                            <div class="text-white-50">${color.percentage}%</div>

                        </div>

                    </div>
                `;

                colorSwatches.appendChild(col);
                
            });
        }








        function copyToClipboard(hex, element) {
            // navigator is a built-in JavaScript object that represents the browser
            navigator.clipboard.writeText(hex).then(() => {

                const originalText = element.querySelector('.fw-bold').textContent;
                const originalBg = element.style.backgroundColor;

                element.querySelector('.fw-bold').textContent = '✅ Copied!';
                
                // After 1.5 seconds, text switches back to originalText
                setTimeout(() => {
                    element.querySelector('.fw-bold').textContent = originalText;
                }, 1500);

            });
        }




        


        function resetUI() {
            loading.classList.add('d-none');    // Hide the spinner
            dropZone.classList.remove('d-none'); // Show the "Drag & Drop" area again
            results.classList.add('d-none');     // Make sure no old results are showing
        }



    </script>

</body>

</html>
